<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RecruitFlow</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    .container { display:flex; height:100vh; }
    .sidebar { width:250px; background:#111; color:white; padding:20px; }
    .main { flex:1; padding:20px; }
    .card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
    input, select, button { padding:8px; margin:5px 0; }
    table { width:100%; border-collapse:collapse; }
    td, th { padding:10px; border-bottom:1px solid #ddd; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
let user = null;

const accounts = {
  taufeeq: { username:"taufeeq", password:"1234", name:"Taufeeq Harris", step:0 },
  jessie: { username:"jessie", password:"1234", name:"Jessie Wood", step:1 },
  seth: { username:"seth", password:"1234", name:"Seth Parker", step:2 },
  zaeem: { username:"zaeem", password:"1234", name:"Zaeem Salie", step:"director" }
};

let applicants = JSON.parse(localStorage.getItem("applicants")) || [
  { id:1, name:"Demo Applicant", role:"Agent", status:"Received", approvals:[null,null,null] }
];

function save(){ localStorage.setItem("applicants", JSON.stringify(applicants)); }

function render(){
  if(!user) return renderLogin();

  document.getElementById("app").innerHTML = `
    <div class="container">
      <div class="sidebar">
        <h2>RecruitFlow</h2>
        <p>${user.name}</p>
        <button onclick="logout()">Logout</button>
      </div>

      <div class="main">
        <h2>Applicants</h2>
        ${renderTable()}
      </div>
    </div>
  `;
}

function renderLogin(){
  document.getElementById("app").innerHTML = `
    <div style="padding:50px; text-align:center">
      <h2>Login</h2>
      <input id="u" placeholder="Username"><br>
      <input id="p" placeholder="Password" type="password"><br>
      <button onclick="login()">Login</button>
    </div>
  `;
}

function login(){
  const u = document.getElementById("u").value;
  const p = document.getElementById("p").value;

  const acc = Object.values(accounts).find(a=>a.username===u && a.password===p);
  if(acc){ user = acc; render(); }
  else alert("Invalid login");
}

function logout(){ user=null; render(); }

function renderTable(){
  let rows = applicants.map(function(a){
    return '<tr>' +
      '<td>' + a.name + '</td>' +
      '<td>' + a.role + '</td>' +
      '<td>' + a.status + '</td>' +
    '</tr>';
  }).join('');

  return '<table>' +
    '<tr><th>Name</th><th>Role</th><th>Status</th></tr>' +
    rows +
  '</table>';
}</td>
          <td>${a.role}</td>
          <td>${a.status}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

render();
</script>

</body>
</html>
