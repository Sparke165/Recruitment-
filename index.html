<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RecruitFlow</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNjMVJYlERNRF9HMjc2rU3NNeUlDl-U0s",
  authDomain: "projectct-d7227.firebaseapp.com",
  databaseURL: "https://projectct-d7227-default-rtdb.firebaseio.com/",
  projectId: "projectct-d7227"
};

firebase.initializeApp(firebaseConfig);
</script>
  <style>
    body { margin:0; font-family: Arial; background:#0f172a; color:#e2e8f0; }
    .container { display:flex; height:100vh; }
    .sidebar { width:260px; background:#020617; padding:20px; display:flex; flex-direction:column; justify-content:space-between; }
    .sidebar button { background:#1f2937; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer; text-align:left; }
    .sidebar button.active { background:#3b82f6; }
    .main { flex:1; padding:25px; overflow:auto; }
    .card { background:#111827; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
    input, select, textarea { padding:8px; border-radius:6px; border:none; background:#1f2937; color:white; width:100%; }
    textarea { resize:vertical; }
    button.primary { background:#3b82f6; border:none; padding:8px 12px; border-radius:6px; color:white; cursor:pointer; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th { text-align:left; font-size:12px; color:#94a3b8; padding:10px; }
    td { padding:12px 10px; border-top:1px solid #1f2937; }
    tr:hover { background:#1e293b; cursor:pointer; }
    .status { padding:4px 8px; border-radius:6px; font-size:12px; }
    .received { background:#1e293b; }
    .reviewed { background:#334155; }
    .interviewed { background:#1e40af; }
    .approved { background:#065f46; }
    .declined { background:#7f1d1d; }
    .login { display:flex; height:100vh; justify-content:center; align-items:center; }
    .login-box { background:#111827; padding:30px; border-radius:12px; width:300px; text-align:center; }
    .flex { display:flex; gap:10px; }
    .small { font-size:12px; color:#94a3b8; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
let user = null;
let selected = null;
let activeTab = "pending";

const accounts = {
  taufeeq: { username:"taufeeq", password:"1234", name:"Taufeeq Harris", step:0 },
  jessie: { username:"jessie", password:"1234", name:"Jessie Wood", step:1 },
  seth: { username:"seth", password:"1234", name:"Seth Parker", step:2 },
  zaeem: { username:"zaeem", password:"1234", name:"Zaeem Salie", step:"director" }
};

function escapeHTML(str){
  return String(str||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/\"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

let applicants = JSON.parse(localStorage.getItem("applicants")) || [
  { id:1, name:"Demo Applicant", role:"Agent", status:"Received", approvals:[null,null,null], notes:[], cv:[] }
];

function save(){ localStorage.setItem("applicants", JSON.stringify(applicants)); }

function render(){
  if(!user) return renderLogin();
  document.getElementById("app").innerHTML = `
    <div class="container">
      <div class="sidebar">
        <div>
          <h2>RecruitFlow</h2>
          <p>${escapeHTML(user.name)}</p>
          <button class="${activeTab==='pending'?'active':''}" onclick="setTab('pending')">Pending</button>
          <button class="${activeTab==='approved'?'active':''}" onclick="setTab('approved')">Approved</button>
          <button class="${activeTab==='declined'?'active':''}" onclick="setTab('declined')">Declined</button>
        </div>
        <button onclick="logout()">Logout</button>
      </div>
      <div class="main">
        ${selected ? renderProfile() : renderMain()}
      </div>
    </div>
  `;
}

function setTab(tab){ activeTab = tab; render(); }

function renderMain(){
  return renderDashboard() + renderFilteredTable();
}

function renderDashboard(){
  const total = applicants.length;
  const approved = applicants.filter(a=>a.status==="Approved").length;
  const declined = applicants.filter(a=>a.status==="Declined").length;
  const pending = applicants.filter(a=>a.status!=="Approved" && a.status!=="Declined").length;
  return `
    <div class="card">
      <h2>Dashboard</h2>
      <div class="flex">
        <div class="card" style="flex:1; text-align:center;"><div class="small">Total</div><div>${total}</div></div>
        <div class="card" style="flex:1; text-align:center;"><div class="small">Approved</div><div>${approved}</div></div>
        <div class="card" style="flex:1; text-align:center;"><div class="small">Declined</div><div>${declined}</div></div>
        <div class="card" style="flex:1; text-align:center;"><div class="small">Pending</div><div>${pending}</div></div>
      </div>
    </div>
  `;
}

function getFiltered(){
  if(activeTab==="approved") return applicants.filter(a=>a.status==="Approved");
  if(activeTab==="declined") return applicants.filter(a=>a.status==="Declined");
  return applicants.filter(a=>a.status!=="Approved" && a.status!=="Declined");
}

function renderFilteredTable(){
  const data = getFiltered();

  let rows = "";
  if(data.length>0){
    rows = data.map(a=>{
      let statusClass = a.status.toLowerCase();
      return `<tr onclick="openProfile(${a.id})">
        <td>${escapeHTML(a.name)}</td>
        <td>${escapeHTML(a.role)}</td>
        <td><span class="status ${statusClass}">${a.status}</span></td>
      </tr>`;
    }).join("");
  }

  return `
    <div class="card">
      <div class="flex" style="justify-content:space-between; align-items:center;">
        <h2>${activeTab.charAt(0).toUpperCase()+activeTab.slice(1)} Applicants</h2>
        <button class="primary" onclick="addApplicant()">+ Add Applicant</button>
      </div>

      ${data.length===0 ? '<p class="small">No applicants</p>' : `
        <table>
          <tr><th>Name</th><th>Role</th><th>Status</th></tr>
          ${rows}
        </table>
      `}
    </div>
  `;
} Applicants</h2>
        <button class="primary" onclick="addApplicant()">+ Add Applicant</button>
      </div>
      ${renderTable(data)}
    </div>
  `;
}

function renderTable(data){
  if(!data || data.length===0){
    return `<p class="small">No applicants</p>`;
  }
  let rows = data.map(a => {
    let statusClass = (a.status||"").toLowerCase();
    return `<tr onclick="openProfile(${a.id})">
      <td>${escapeHTML(a.name)}</td>
      <td>${escapeHTML(a.role)}</td>
      <td><span class="status ${statusClass}">${escapeHTML(a.status)}</span></td>
    </tr>`;
  }).join("");

  return `<table>
    <tr><th>Name</th><th>Role</th><th>Status</th></tr>
    ${rows}
  </table>`;
}

function openProfile(id){ selected = applicants.find(a=>a.id===id) || null; render(); }
function back(){ selected=null; render(); }

function renderProfile(){
  const a = selected;
  if(!a) return "";
  return `
    <button onclick="back()">← Back</button>

    <div class="card">
      <input value="${escapeHTML(a.name)}" onchange="updateField('name',this.value)">
      <input value="${escapeHTML(a.role)}" onchange="updateField('role',this.value)">
      <select onchange="updateField('status',this.value)">
        <option ${a.status==='Received'?'selected':''}>Received</option>
        <option ${a.status==='Reviewed'?'selected':''}>Reviewed</option>
        <option ${a.status==='Interviewed'?'selected':''}>Interviewed</option>
        <option ${a.status==='Approved'?'selected':''}>Approved</option>
        <option ${a.status==='Declined'?'selected':''}>Declined</option>
      </select>
    </div>

    <div class="card">
      <h3>Notes</h3>
      <div class="flex">
        <input id="note">
        <button class="primary" onclick="addNote()">Add</button>
      </div>
      ${a.notes.map(n=>`<div class="small">${escapeHTML(n)}</div>`).join("")}
    </div>

    <div class="card">
      <h3>CV Links</h3>
      <div class="flex">
        <input id="cv">
        <button class="primary" onclick="addCV()">Add</button>
      </div>
      ${a.cv.map(l=>`<div><a href="${escapeHTML(l)}" target="_blank">Open CV</a></div>`).join("")}
    </div>

    <div class="card">
      <h3>Approvals</h3>
      ${[0,1,2].map(i=>{
        let names=["Taufeeq","Jessie","Seth"];
        let val = a.approvals[i];
        return `<div class="flex">
          <span>${names[i]}</span>
          <button onclick="approve(${i},true)">✔</button>
          <button onclick="approve(${i},false)">✖</button>
          <span class="small">${val===true?"Approved":val===false?"Declined":"Pending"}</span>
        </div>`;
      }).join("")}
    </div>
  `;
}" onchange="updateField('name',this.value)">
      <input value="${escapeHTML(a.role)}" onchange="updateField('role',this.value)">
      <select onchange="updateField('status',this.value)">
        <option ${a.status==='Received'?'selected':''}>Received</option>
        <option ${a.status==='Reviewed'?'selected':''}>Reviewed</option>
        <option ${a.status==='Interviewed'?'selected':''}>Interviewed</option>
        <option ${a.status==='Approved'?'selected':''}>Approved</option>
        <option ${a.status==='Declined'?'selected':''}>Declined</option>
      </select>
    </div>
  `;
}

function updateField(field,value){ if(!selected) return; selected[field]=value; save(); }

function addApplicant(){
  const id = Date.now();
  applicants.unshift({ id, name:"New Applicant", role:"Role", status:"Received", approvals:[null,null,null], notes:[], cv:[] });
  save(); render();
}

function login(){
  const u = document.getElementById("u").value;
  const p = document.getElementById("p").value;
  const acc = Object.values(accounts).find(a=>a.username===u && a.password===p);
  if(acc){ user = acc; render(); }
  else alert("Invalid login");
}

function logout(){ user=null; selected=null; render(); }

function renderLogin(){
  document.getElementById("app").innerHTML = `
    <div class="login">
      <div class="login-box">
        <h2>Login</h2>
        <input id="u" placeholder="Username"><br>
        <input id="p" placeholder="Password" type="password"><br>
        <button class="primary" onclick="login()">Login</button>
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
