<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RecruitFlow</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
  const firebaseConfig = {
    apiKey: "AIzaSyBNjMVJYLRNRF9HmjC2rU3NNeU1Dl-U0s",
    authDomain: "projectct-d7227.firebaseapp.com",
    databaseURL: "https://projectct-d7227-default-rtdb.firebaseio.com/",
    projectId: "projectct-d7227"
  };

  firebase.initializeApp(firebaseConfig);
  </script>

  <style>
    body { margin:0; font-family: Arial; background:#0f172a; color:#e2e8f0; }
    .container { display:flex; height:100vh; }
    .sidebar { width:260px; background:#020617; padding:20px; display:flex; flex-direction:column; justify-content:space-between; }
    .sidebar button { background:#1f2937; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer; text-align:left; }
    .sidebar button.active { background:#3b82f6; }
    .main { flex:1; padding:25px; overflow:auto; }
    .card { background:#111827; padding:15px; border-radius:12px; margin-bottom:15px; }
    input, select { padding:8px; border-radius:6px; border:none; background:#1f2937; color:white; width:100%; margin-bottom:10px; }
    button.primary { background:#3b82f6; border:none; padding:8px 12px; border-radius:6px; color:white; cursor:pointer; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th { text-align:left; font-size:12px; color:#94a3b8; padding:10px; }
    td { padding:12px 10px; border-top:1px solid #1f2937; }
    tr:hover { background:#1e293b; cursor:pointer; }
    .login { display:flex; height:100vh; justify-content:center; align-items:center; }
    .login-box { background:#111827; padding:30px; border-radius:12px; width:300px; text-align:center; }
    .flex { display:flex; gap:10px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
let user = null;
let selected = null;
let activeTab = "pending";

const accounts = {
  taufeeq: { username:"taufeeq", password:"1234", name:"Taufeeq Harris", step:0 },
  jessie: { username:"jessie", password:"1234", name:"Jessie Wood", step:1 },
  seth: { username:"seth", password:"1234", name:"Seth Parker", step:2 },
  zaeem: { username:"zaeem", password:"1234", name:"Zaeem Salie", step:"director" }
};

let applicants = [];

function save(){
  const obj = {};
  applicants.forEach(a => { obj[a.id] = a; });
  firebase.database().ref("applicants").set(obj);
}

function render(){
  if(!user) return renderLogin();

  document.getElementById("app").innerHTML = `
    <div class="container">
      <div class="sidebar">
        <div>
          <h2>RecruitFlow</h2>
          <p>${user.name}</p>
          <button class="${activeTab==='pending'?'active':''}" onclick="setTab('pending')">Pending</button>
          <button class="${activeTab==='approved'?'active':''}" onclick="setTab('approved')">Approved</button>
          <button class="${activeTab==='declined'?'active':''}" onclick="setTab('declined')">Declined</button>
        </div>
        <button onclick="logout()">Logout</button>
      </div>

      <div class="main">
        ${selected ? renderProfile() : renderDashboard() + renderTableSection()}
      </div>
    </div>
  `;
}

function setTab(tab){ activeTab = tab; render(); }

function renderDashboard(){
  return `<div class="card"><h2>Dashboard</h2></div>`;
}

function getFiltered(){
  if(activeTab==="approved") return applicants.filter(a=>a.status==="Approved");
  if(activeTab==="declined") return applicants.filter(a=>a.status==="Declined");
  return applicants.filter(a=>a.status!=="Approved" && a.status!=="Declined");
}

function renderTableSection(){
  const data = getFiltered();

  let rows = (data || []).map(a=>`
    <tr onclick="openProfile(${a.id})">
      <td>${a.name}</td>
      <td>${a.role}</td>
      <td>${a.status}</td>
    </tr>
  `).join("");

  return `
    <div class="card">
      <div class="flex" style="justify-content:space-between;">
        <h2>Applicants</h2>
        <button class="primary" onclick="addApplicant()">+ Add Applicant</button>
      </div>

      ${data.length===0 ? '<p>No applicants</p>' : `
        <table>
          <tr><th>Name</th><th>Role</th><th>Status</th></tr>
          ${rows}
        </table>
      `}
    </div>
  `;
}

function openProfile(id){ selected = applicants.find(a=>a.id===id); render(); }
function back(){ selected=null; render(); }

function renderProfile(){
  const a = selected;
  return `
    <button onclick="back()">Back</button>
    <div class="card">
      <input value="${a.name}" onchange="updateField('name',this.value)">
      <input value="${a.role}" onchange="updateField('role',this.value)">
    </div>
  `;
}

function updateField(field,value){ selected[field]=value; save(); }

function addApplicant(){
  applicants.unshift({ id:Date.now(), name:"New Applicant", role:"Role", status:"Received" });
  save(); render();
}

function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;
  let acc=Object.values(accounts).find(a=>a.username===u && a.password===p);
  if(acc){ user=acc; render(); }
}

function logout(){ user=null; render(); }

function renderLogin(){
  document.getElementById("app").innerHTML = `
    <div class="login">
      <div class="login-box">
        <h2>Login</h2>
        <input id="u"><br>
        <input id="p" type="password"><br>
        <button onclick="login()">Login</button>
      </div>
    </div>
  `;
}

firebase.database().ref("applicants").on("value", snap=>{
  const data = snap.val() || {};
  applicants = Object.values(data);
  render();
});

render();
</script>
</body>
</html>
