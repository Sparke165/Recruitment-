<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RecruitFlow</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBNjMVJYlERNRF9HMjc2rU3NNeUlDl-U0s",
  authDomain: "projectct-d7227.firebaseapp.com",
  databaseURL: "https://projectct-d7227-default-rtdb.firebaseio.com/",
  projectId: "projectct-d7227"
};

firebase.initializeApp(firebaseConfig);
</script>
  <style>
    body { margin:0; font-family: Arial; background:#0f172a; color:#e2e8f0; }
    .container { display:flex; height:100vh; }
    .sidebar { width:260px; background:#020617; padding:20px; display:flex; flex-direction:column; justify-content:space-between; }
    .sidebar button { background:#1f2937; border:none; color:white; padding:10px; border-radius:6px; cursor:pointer; text-align:left; margin-bottom:5px; }
    .sidebar button.active { background:#3b82f6; }
    .main { flex:1; padding:25px; overflow:auto; }
    .card { background:#111827; padding:15px; border-radius:12px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
    input, select { padding:8px; border-radius:6px; border:none; background:#1f2937; color:white; width:100%; margin-bottom:10px; }
    button.primary { background:#3b82f6; border:none; padding:8px 12px; border-radius:6px; color:white; cursor:pointer; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th { text-align:left; font-size:12px; color:#94a3b8; padding:10px; }
    td { padding:12px 10px; border-top:1px solid #1f2937; }
    tr:hover { background:#1e293b; cursor:pointer; }
    .status { padding:4px 8px; border-radius:6px; font-size:12px; }
    .received { background:#1e293b; }
    .reviewed { background:#334155; }
    .interviewed { background:#1e40af; }
    .approved { background:#065f46; }
    .declined { background:#7f1d1d; }
    .login { display:flex; height:100vh; justify-content:center; align-items:center; }
    .login-box { background:#111827; padding:30px; border-radius:12px; width:300px; text-align:center; }
    .flex { display:flex; gap:10px; align-items:center; }
    .small { font-size:12px; color:#94a3b8; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
let user = null;
let selected = null;
let activeTab = "pending";

const accounts = {
  taufeeq: { username:"taufeeq", password:"1234", name:"Taufeeq Harris", step:0 },
  jessie: { username:"jessie", password:"1234", name:"Jessie Wood", step:1 },
  seth: { username:"seth", password:"1234", name:"Seth Parker", step:2 },
  zaeem: { username:"zaeem", password:"1234", name:"Zaeem Salie", step:"director" }
};

function escapeHTML(str){
  return String(str||"")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}

let applicants = [];

firebase.database().ref("applicants").on("value", function(snapshot){
  applicants = snapshot.val() || [];
  render();
});

function save(){
  firebase.database().ref("applicants").set(applicants);
}

function render(){
  if(!user) return renderLogin();
  document.getElementById("app").innerHTML = `
    <div class="container">
      <div class="sidebar">
        <div>
          <h2>RecruitFlow</h2>
          <p>${user.name}</p>
          <button class="${activeTab==='pending'?'active':''}" onclick="setTab('pending')">Pending</button>
          <button class="${activeTab==='approved'?'active':''}" onclick="setTab('approved')">Approved</button>
          <button class="${activeTab==='declined'?'active':''}" onclick="setTab('declined')">Declined</button>
        </div>
        <button onclick="logout()">Logout</button>
      </div>
      <div class="main">
        ${selected ? renderProfile() : renderMain()}
      </div>
    </div>
  `;
}

function setTab(tab){ activeTab = tab; render(); }

function renderMain(){
  return renderDashboard() + renderTableSection();
}

function renderDashboard(){
  const total = applicants.length;
  const approved = applicants.filter(a=>a.status==="Approved").length;
  const declined = applicants.filter(a=>a.status==="Declined").length;
  const pending = applicants.filter(a=>a.status!=="Approved" && a.status!=="Declined").length;

  return `
    <div class="card">
      <h2>Dashboard</h2>
      <div class="flex">
        <div class="card" style="flex:1;text-align:center;"><div class="small">Total</div>${total}</div>
        <div class="card" style="flex:1;text-align:center;"><div class="small">Approved</div>${approved}</div>
        <div class="card" style="flex:1;text-align:center;"><div class="small">Declined</div>${declined}</div>
        <div class="card" style="flex:1;text-align:center;"><div class="small">Pending</div>${pending}</div>
      </div>
    </div>
  `;
}

function getFiltered(){
  if(activeTab==="approved") return applicants.filter(a=>a.status==="Approved");
  if(activeTab==="declined") return applicants.filter(a=>a.status==="Declined");
  return applicants.filter(a=>a.status!=="Approved" && a.status!=="Declined");
}

function renderTableSection(){
  const data = getFiltered();

  if(data.length===0){
    return `<div class="card"><p class="small">No applicants</p></div>`;
  }

  let rows = data.map(a=>{
    let statusClass = a.status.toLowerCase();
    return `<tr onclick="openProfile(${a.id})">
      <td>${escapeHTML(a.name)}</td>
      <td>${escapeHTML(a.role)}</td>
      <td><span class="status ${statusClass}">${a.status}</span></td>
    </tr>`;
  }).join("");

  return `
    <div class="card">
      <div class="flex" style="justify-content:space-between;">
        <h2>${activeTab} Applicants</h2>
        <button class="primary" onclick="addApplicant()">+ Add</button>
      </div>
      <table>
        <tr><th>Name</th><th>Role</th><th>Status</th></tr>
        ${rows}
      </table>
    </div>
  `;
}

function openProfile(id){ selected = applicants.find(a=>a.id===id); render(); }
function back(){ selected=null; render(); }

function renderProfile(){
  const a = selected;

  return `
    <button onclick="back()">← Back</button>

    <div class="card">
      <input value="${a.name}" onchange="updateField('name',this.value)">
      <input value="${a.role}" onchange="updateField('role',this.value)">
      <select onchange="updateField('status',this.value)">
        <option ${a.status==='Received'?'selected':''}>Received</option>
        <option ${a.status==='Reviewed'?'selected':''}>Reviewed</option>
        <option ${a.status==='Interviewed'?'selected':''}>Interviewed</option>
        <option ${a.status==='Approved'?'selected':''}>Approved</option>
        <option ${a.status==='Declined'?'selected':''}>Declined</option>
      </select>
    </div>

    <div class="card">
      <h3>Notes</h3>
      <div class="flex">
        <input id="note">
        <button class="primary" onclick="addNote()">Add</button>
      </div>
      ${a.notes.map(n=>`<div class="small">${n}</div>`).join("")}
    </div>

    <div class="card">
      <h3>CV Links</h3>
      <div class="flex">
        <input id="cv">
        <button class="primary" onclick="addCV()">Add</button>
      </div>
      ${a.cv.map(l=>`<div><a href="${l}" target="_blank">Open CV</a></div>`).join("")}
    </div>

    <div class="card">
      <h3>Approvals</h3>
      ${[0,1,2].map(i=>{
        let names=["Taufeeq","Jessie","Seth"];
        let val=a.approvals[i];
        return `<div class="flex">
          <span>${names[i]}</span>
          <button onclick="approve(${i},true)">✔</button>
          <button onclick="approve(${i},false)">✖</button>
          <span class="small">${val===true?"Approved":val===false?"Declined":"Pending"}</span>
        </div>`;
      }).join("")}
    </div>
  `;
}

function updateField(field,value){
  selected[field]=value;
  save();
}

function addNote(){
  let val=document.getElementById("note").value;
  if(!val) return;
  selected.notes.unshift(user.name+": "+val);
  save(); render();
}

function addCV(){
  let val=document.getElementById("cv").value;
  if(!val) return;
  selected.cv.unshift(val);
  save(); render();
}

function approve(i,val){
  if(user.step!==i && user.step!=="director") return;
  selected.approvals[i]=val;
  save(); render();
}

function addApplicant(){
  applicants.unshift({
    id:Date.now(),
    name:"New Applicant",
    role:"Role",
    status:"Received",
    approvals:[null,null,null],
    notes:[],
    cv:[]
  });
  save(); render();
}

function login(){
  let u=document.getElementById("u").value;
  let p=document.getElementById("p").value;
  let acc=Object.values(accounts).find(a=>a.username===u && a.password===p);
  if(acc){ user=acc; render(); } else alert("Invalid");
}

function logout(){ user=null; selected=null; render(); }

function renderLogin(){
  document.getElementById("app").innerHTML=`
    <div class="login">
      <div class="login-box">
        <h2>Login</h2>
        <input id="u"><br>
        <input id="p" type="password"><br>
        <button class="primary" onclick="login()">Login</button>
      </div>
    </div>
  `;
}

render();
</script>
</body>
</html>
